name: 09 - Using functions

on:
    pull_request:
    workflow_dispatch:

jobs:
    echo1:
        runs-on: ubuntu-latest
        steps:
            - name: Failing step
              run: exit 1
            - name: I will be skipped
              if: ${{ success() }}
              run: echo "I will print if prev step successd ."
            - name: I will execute
              if: ${{ failure() }}
              run: echo "I will print if step fails" 
            - name: I will execute
              if: ${{ !cancelled() }}
              run: echo "I will alays print except workflow cancelled"      
            - name: I will execute when cancelled
              if: ${{ cancelled()}}
              run: echo " workflow has been cancelled  "