name: 10 - Controlling the execution Flow

on:
  workflow_dispatch:
    inputs:
        pass-unit-tests:
            type: boolean
            description: 'Whether test pass or not'
            default: true


jobs:
    lint-build:
        runs-on: ubuntu-latest
        steps:
            - name: lint and build
              run: echo "linting and building proj"

    unit-test:
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
           - name: Running unit tests
             run: echo " Running tests"
           - name: Failing tests
             if: ${{ !inputs.pass-unit-tests }}
             run: exit 1

    deploy-nonprod:
        runs-on: ubuntu-latest
        needs: 
            - lint-build
            - unit-test
        steps:
            - name: Deploying to nonprod
              run: echo "Deploying to non prod "


    e2e-tests:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps:
            - name: Running E2E tests
              run: echo "Running E2E tests "
    load-test:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps:
            - name: Running load tests
              run: echo "Running E2E tests"          

    deploy-prod:
        runs-on: ubuntu-latest
        needs:
            - e2e-tests
            - load-test
        steps:
            - name: Deploying to prod
              run: echo "Running in prod"          
