name: 04 Using - Actions

on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 04-using-actions/react-app 
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: setup node 
              uses: actions/setup-node@v6
              with:
                node-version: '24.x'
                
            - name: Install Dependencies
              run: npm ci  
            - name: Run Unit Tests
              run: npm run test 
               
              

